<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<style>
:root { color-scheme: light dark; }
text { font-family: system-ui, -apple-system, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
.tf { font-size: 11px; font-weight: 400; fill: #888780; font-style: italic; }
.callout { font-size: 11px; font-weight: 400; fill: #0F6E56; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
.c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
.c-blue .th { fill: #0C447C; } .c-blue .ts { fill: #185FA5; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
.c-coral rect { fill: #FAECE7; stroke: #993C1D; }
.c-coral .th { fill: #712B13; } .c-coral .ts { fill: #993C1D; }
.c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
.c-amber .th { fill: #633806; } .c-amber .ts { fill: #854F0B; }
line.axis { stroke: #B4B2A9; }
line.callout-line { stroke: #0F6E56; }
@media (prefers-color-scheme: dark) {
.th { fill: #D3D1C7; } .ts { fill: #888780; } .tf { fill: #5F5E5A; }
.callout { fill: #5DCAA5; }
.c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; } .c-teal .ts { fill: #5DCAA5; }
.c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; } .c-blue .ts { fill: #85B7EB; }
.c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
.c-coral rect { fill: #712B13; stroke: #F0997B; } .c-coral .th { fill: #F5C4B3; } .c-coral .ts { fill: #F0997B; }
.c-amber rect { fill: #633806; stroke: #FAC775; } .c-amber .th { fill: #FAEEDA; } .c-amber .ts { fill: #FAC775; }
line.axis { stroke: #5F5E5A; }
line.callout-line { stroke: #5DCAA5; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="340" y="28" text-anchor="middle">Where AI creates value in OpenMRS</text>
<text class="ts" x="340" y="46" text-anchor="middle">Four integration opportunities mapped by clinical impact and data readiness</text>

<line class="axis" x1="120" y1="70" x2="120" y2="460" stroke-width="1" marker-end="url(#arrow)"/>
<line class="axis" x1="120" y1="460" x2="640" y2="460" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="70" y="74" text-anchor="middle">High clinical</text>
<text class="ts" x="70" y="88" text-anchor="middle">impact</text>
<text class="ts" x="70" y="450" text-anchor="middle">Lower clinical</text>
<text class="ts" x="70" y="464" text-anchor="middle">impact</text>
<text class="ts" x="160" y="485" text-anchor="start">Data less ready</text>
<text class="ts" x="620" y="485" text-anchor="end">Data more ready</text>

<text class="ts" x="22" y="270" text-anchor="middle" transform="rotate(-90, 22, 270)">Clinical impact</text>

<g class="c-teal">
<rect x="380" y="90" width="220" height="60" rx="10" stroke-width="1"/>
<text class="th" x="490" y="112" text-anchor="middle" dominant-baseline="central">Clinical decision support</text>
<text class="ts" x="490" y="132" text-anchor="middle" dominant-baseline="central">Concept dictionary enables this</text>
</g>

<line class="callout-line" x1="490" y1="150" x2="490" y2="170" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="callout" x="490" y="183" text-anchor="middle">Highest value: structured data ready, HIV/TB use cases proven</text>

<g class="c-purple">
<rect x="140" y="200" width="190" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="235" y="222" text-anchor="middle" dominant-baseline="central">NLP on clinical notes</text>
<text class="ts" x="235" y="242" text-anchor="middle" dominant-baseline="central">Free text is unstructured</text>
</g>

<g class="c-blue">
<rect x="400" y="290" width="210" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="505" y="312" text-anchor="middle" dominant-baseline="central">Population-level analytics</text>
<text class="ts" x="505" y="332" text-anchor="middle" dominant-baseline="central">Years of cross-site data</text>
</g>

<g class="c-amber">
<rect x="370" y="385" width="210" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="475" y="407" text-anchor="middle" dominant-baseline="central">Automated data quality</text>
<text class="ts" x="475" y="425" text-anchor="middle" dominant-baseline="central">Anomaly detection on entry</text>
</g>

<text class="tf" x="340" y="530" text-anchor="middle">Assessment based on OpenMRS data architecture and published community discussions</text>

</svg>