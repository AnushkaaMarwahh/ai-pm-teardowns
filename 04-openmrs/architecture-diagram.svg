<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
<style>
:root { color-scheme: light dark; }
text { font-family: system-ui, -apple-system, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
.tf { font-size: 11px; font-weight: 400; fill: #888780; font-style: italic; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray .th { fill: #2C2C2A; } .c-gray .ts { fill: #5F5E5A; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
.c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
.c-blue .th { fill: #0C447C; } .c-blue .ts { fill: #185FA5; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
.c-coral rect { fill: #FAECE7; stroke: #993C1D; }
.c-coral .th { fill: #712B13; } .c-coral .ts { fill: #993C1D; }
.c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
.c-amber .th { fill: #633806; } .c-amber .ts { fill: #854F0B; }
.c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
.c-green .th { fill: #27500A; } .c-green .ts { fill: #3B6D11; }
line.conn { stroke: #B4B2A9; }
@media (prefers-color-scheme: dark) {
.th { fill: #D3D1C7; } .ts { fill: #888780; } .tf { fill: #5F5E5A; }
.c-gray rect { fill: #444441; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; } .c-gray .ts { fill: #B4B2A9; }
.c-teal rect { fill: #085041; stroke: #5DCAA5; } .c-teal .th { fill: #9FE1CB; } .c-teal .ts { fill: #5DCAA5; }
.c-blue rect { fill: #0C447C; stroke: #85B7EB; } .c-blue .th { fill: #B5D4F4; } .c-blue .ts { fill: #85B7EB; }
.c-purple rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
.c-coral rect { fill: #712B13; stroke: #F0997B; } .c-coral .th { fill: #F5C4B3; } .c-coral .ts { fill: #F0997B; }
.c-amber rect { fill: #633806; stroke: #FAC775; } .c-amber .th { fill: #FAEEDA; } .c-amber .ts { fill: #FAC775; }
.c-green rect { fill: #27500A; stroke: #97C459; } .c-green .th { fill: #C0DD97; } .c-green .ts { fill: #97C459; }
line.conn { stroke: #5F5E5A; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="340" y="28" text-anchor="middle">OpenMRS: conceptual system architecture</text>
<text class="ts" x="340" y="46" text-anchor="middle">Layered open-source EMR with concept dictionary at the core</text>

<g class="c-blue">
<rect x="145" y="70" width="390" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="86" text-anchor="middle" dominant-baseline="central">O3 Frontend (React micro-frontends)</text>
<text class="ts" x="340" y="102" text-anchor="middle" dominant-baseline="central">Modular UI components, Carbon Design System</text>
</g>

<line class="conn" x1="340" y1="114" x2="340" y2="140" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="100" y="140" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="220" y="156" text-anchor="middle" dominant-baseline="central">REST API</text>
<text class="ts" x="220" y="172" text-anchor="middle" dominant-baseline="central">Internal data access</text>
</g>

<g class="c-teal">
<rect x="360" y="140" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="470" y="156" text-anchor="middle" dominant-baseline="central">FHIR API</text>
<text class="ts" x="470" y="172" text-anchor="middle" dominant-baseline="central">Interoperability standard</text>
</g>

<line class="conn" x1="220" y1="184" x2="220" y2="215" stroke-width="0.5" marker-end="url(#arrow)"/>
<line class="conn" x1="470" y1="184" x2="470" y2="215" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="100" y="215" width="480" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="231" text-anchor="middle" dominant-baseline="central">Core API layer (Java services)</text>
<text class="ts" x="340" y="247" text-anchor="middle" dominant-baseline="central">PatientService, ConceptService, EncounterService, ObsService</text>
</g>

<line class="conn" x1="340" y1="259" x2="340" y2="290" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="100" y="290" width="480" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="310" text-anchor="middle" dominant-baseline="central">EAV Data Model (observations table)</text>
<text class="ts" x="340" y="328" text-anchor="middle" dominant-baseline="central">All clinical data stored as entity-attribute-value rows</text>
</g>

<line class="conn" x1="340" y1="346" x2="340" y2="380" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-amber">
<rect x="175" y="380" width="330" height="56" rx="10" stroke-width="1"/>
<text class="th" x="340" y="400" text-anchor="middle" dominant-baseline="central">Concept Dictionary (the core)</text>
<text class="ts" x="340" y="418" text-anchor="middle" dominant-baseline="central">Defines all questions, answers, and data types</text>
</g>

<g class="c-green">
<rect x="40" y="470" width="140" height="50" rx="6" stroke-width="0.5"/>
<text class="th" x="110" y="489" text-anchor="middle" dominant-baseline="central">KenyaEMR</text>
<text class="ts" x="110" y="505" text-anchor="middle" dominant-baseline="central">Country distro</text>
</g>

<g class="c-green">
<rect x="200" y="470" width="140" height="50" rx="6" stroke-width="0.5"/>
<text class="th" x="270" y="489" text-anchor="middle" dominant-baseline="central">UgandaEMR</text>
<text class="ts" x="270" y="505" text-anchor="middle" dominant-baseline="central">Country distro</text>
</g>

<g class="c-green">
<rect x="360" y="470" width="140" height="50" rx="6" stroke-width="0.5"/>
<text class="th" x="430" y="489" text-anchor="middle" dominant-baseline="central">Bahmni</text>
<text class="ts" x="430" y="505" text-anchor="middle" dominant-baseline="central">Hospital system</text>
</g>

<g class="c-green">
<rect x="520" y="470" width="120" height="50" rx="6" stroke-width="0.5"/>
<text class="th" x="580" y="489" text-anchor="middle" dominant-baseline="central">Custom</text>
<text class="ts" x="580" y="505" text-anchor="middle" dominant-baseline="central">Your modules</text>
</g>

<text class="ts" x="340" y="545" text-anchor="middle">Distributions: core platform + country/use-case specific modules</text>

<text class="tf" x="340" y="585" text-anchor="middle">Conceptual architecture based on OpenMRS documentation, O3 docs, and technical wiki</text>

</svg>