<svg viewBox="0 0 780 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="600" fill="#ffffff"/>
  <style>text { font-family: Arial, Helvetica, sans-serif; }</style>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">OpenMRS: conceptual system architecture</text>
  <text x="390" y="39" text-anchor="middle" font-size="11" fill="#888888">Layered open-source EMR with concept dictionary at the core</text>

  <!-- ===== LAYER 1: O3 Frontend ===== -->
  <rect x="56" y="54" width="668" height="54" rx="6" fill="#ddeeff" stroke="#5588cc" stroke-width="1.5"/>
  <text x="390" y="77" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a5a9b">O3 Frontend (React micro-frontends)</text>
  <text x="390" y="97" text-anchor="middle" font-size="10" fill="#2a5a9b">Modular UI components, Carbon Design System</text>

  <!-- Connector arrows down from O3 Frontend to REST API and FHIR API -->
  <line x1="228" y1="108" x2="228" y2="126" stroke="#cccccc" stroke-width="1"/>
  <polygon points="228,131 223,123 233,123" fill="#cccccc"/>
  <line x1="552" y1="108" x2="552" y2="126" stroke="#cccccc" stroke-width="1"/>
  <polygon points="552,131 547,123 557,123" fill="#cccccc"/>

  <!-- ===== LAYER 2: REST API + FHIR API (side by side) ===== -->
  <rect x="56" y="131" width="324" height="52" rx="6" fill="#d5f2e8" stroke="#4db893" stroke-width="1.5"/>
  <text x="218" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f7a55">REST API</text>
  <text x="218" y="171" text-anchor="middle" font-size="9.5" fill="#1f7a55">Internal data access</text>

  <rect x="400" y="131" width="324" height="52" rx="6" fill="#d5f2e8" stroke="#4db893" stroke-width="1.5"/>
  <text x="562" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f7a55">FHIR API</text>
  <text x="562" y="171" text-anchor="middle" font-size="9.5" fill="#1f7a55">Interoperability standard</text>

  <!-- Connectors down to Core API layer -->
  <line x1="218" y1="183" x2="218" y2="200" stroke="#cccccc" stroke-width="1"/>
  <line x1="562" y1="183" x2="562" y2="200" stroke="#cccccc" stroke-width="1"/>
  <polyline points="218,200 390,200 390,210" fill="none" stroke="#cccccc" stroke-width="1"/>
  <polyline points="562,200 390,200" fill="none" stroke="#cccccc" stroke-width="1"/>
  <polygon points="390,215 385,207 395,207" fill="#cccccc"/>

  <!-- ===== LAYER 3: Core API layer ===== -->
  <rect x="56" y="215" width="668" height="56" rx="6" fill="#ddeeff" stroke="#5588cc" stroke-width="1.5"/>
  <text x="390" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a5a9b">Core API layer (Java services)</text>
  <text x="390" y="258" text-anchor="middle" font-size="9.5" fill="#2a5a9b">PatientService, ConceptService, EncounterService, ObsService</text>

  <!-- Arrow down -->
  <line x1="390" y1="271" x2="390" y2="287" stroke="#cccccc" stroke-width="1"/>
  <polygon points="390,292 385,284 395,284" fill="#cccccc"/>

  <!-- ===== LAYER 4: EAV Data Model ===== -->
  <rect x="56" y="292" width="668" height="56" rx="6" fill="#fde8d2" stroke="#d97a3a" stroke-width="1.5"/>
  <text x="390" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#9b4015">EAV Data Model (observations table)</text>
  <text x="390" y="335" text-anchor="middle" font-size="9.5" fill="#9b4015">All clinical data stored as entity-attribute-value rows</text>

  <!-- Arrow down -->
  <line x1="390" y1="348" x2="390" y2="364" stroke="#cccccc" stroke-width="1"/>
  <polygon points="390,369 385,361 395,361" fill="#cccccc"/>

  <!-- ===== LAYER 5: Concept Dictionary ===== -->
  <rect x="56" y="369" width="668" height="56" rx="6" fill="#fde8d2" stroke="#d97a3a" stroke-width="2"/>
  <text x="390" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="#9b4015">Concept Dictionary (the core)</text>
  <text x="390" y="412" text-anchor="middle" font-size="9.5" fill="#9b4015">Defines all questions, answers, and data types</text>

  <!-- ===== Distributions row ===== -->
  <text x="390" y="449" text-anchor="middle" font-size="9.5" fill="#aaaaaa">Distributions: core platform + country/use-case specific modules</text>

  <!-- KenyaEMR -->
  <rect x="56" y="456" width="152" height="44" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="132" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#444444">KenyaEMR</text>
  <text x="132" y="490" text-anchor="middle" font-size="9" fill="#888888">Country distro</text>

  <!-- UgandaEMR -->
  <rect x="224" y="456" width="152" height="44" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="300" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#444444">UgandaEMR</text>
  <text x="300" y="490" text-anchor="middle" font-size="9" fill="#888888">Country distro</text>

  <!-- Bahmni -->
  <rect x="392" y="456" width="152" height="44" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="468" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#444444">Bahmni</text>
  <text x="468" y="490" text-anchor="middle" font-size="9" fill="#888888">Hospital system</text>

  <!-- Custom -->
  <rect x="560" y="456" width="164" height="44" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="642" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#444444">Custom</text>
  <text x="642" y="490" text-anchor="middle" font-size="9" fill="#888888">Your modules</text>

  <!-- Caption -->
  <text x="390" y="558" text-anchor="middle" font-size="9" fill="#aaaaaa" font-style="italic">Conceptual architecture based on OpenMRS documentation, O3 docs, and technical wiki</text>
</svg>
