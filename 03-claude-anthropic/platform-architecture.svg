<svg width="100%" viewBox="0 0 800 740" xmlns="http://www.w3.org/2000/svg">
<style>
:root { color-scheme: light dark; }
text { font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif; }
.title { font-size: 15px; font-weight: 600; fill: #1A1A1A; }
.subtitle { font-size: 11px; font-weight: 400; fill: #6B7280; }
.node-label { font-size: 11.5px; font-weight: 600; }
.node-desc { font-size: 9.5px; font-weight: 400; fill: #6B7280; }
.section-label { font-size: 10px; font-weight: 600; fill: #9CA3AF; letter-spacing: 0.08em; text-transform: uppercase; }
.footer { font-size: 9px; font-weight: 400; fill: #9CA3AF; font-style: italic; }
.cloud-label { font-size: 9.5px; font-weight: 500; }
.foundation-label { font-size: 10px; font-weight: 600; fill: #2D6A4F; letter-spacing: 0.06em; }

.n-navy rect { fill: #EFF4F9; stroke: #1E3A5F; } .n-navy .node-label { fill: #1E3A5F; }
.n-sage rect { fill: #EDF5F0; stroke: #2D6A4F; } .n-sage .node-label { fill: #2D6A4F; }
.n-plum rect { fill: #F0EDF5; stroke: #5B4A8A; } .n-plum .node-label { fill: #5B4A8A; }
.n-copper rect { fill: #F5EDE7; stroke: #8B4513; } .n-copper .node-label { fill: #8B4513; }
.n-gold rect { fill: #F3F1E6; stroke: #7C6A2E; } .n-gold .node-label { fill: #7C6A2E; }
.n-slate rect { fill: #F3F4F6; stroke: #6B7280; } .n-slate .node-label { fill: #4B5563; }

line.c { stroke: #D1D5DB; stroke-width: 1; }
line.cd { stroke: #D1D5DB; stroke-width: 0.75; stroke-dasharray: 4 3; }
rect.zone { fill: #FAFAFA; stroke: #E5E7EB; }
rect.foundation { fill: #EDF5F0; stroke: #2D6A4F; }

@media (prefers-color-scheme: dark) {
  .title { fill: #E5E7EB; } .subtitle { fill: #9CA3AF; } .node-desc { fill: #9CA3AF; }
  .footer { fill: #6B7280; } .section-label { fill: #6B7280; } .cloud-label { fill: #9CA3AF; }
  .foundation-label { fill: #86EFAC; }
  .n-navy rect { fill: #172B45; stroke: #4A7FB5; } .n-navy .node-label { fill: #93C5FD; }
  .n-sage rect { fill: #1A3D2E; stroke: #4D9B72; } .n-sage .node-label { fill: #86EFAC; }
  .n-plum rect { fill: #2D2550; stroke: #8B7FC7; } .n-plum .node-label { fill: #C4B5FD; }
  .n-copper rect { fill: #3D2410; stroke: #C87137; } .n-copper .node-label { fill: #FDBA74; }
  .n-gold rect { fill: #342E14; stroke: #B59B3A; } .n-gold .node-label { fill: #FDE68A; }
  .n-slate rect { fill: #1F2937; stroke: #6B7280; } .n-slate .node-label { fill: #D1D5DB; }
  line.c { stroke: #4B5563; } line.cd { stroke: #4B5563; }
  rect.zone { fill: #1F2937; stroke: #374151; }
  rect.foundation { fill: #1A3D2E; stroke: #4D9B72; }
}
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="section-label" x="400" y="82" text-anchor="middle">Model Family</text>
<rect class="zone" x="100" y="92" width="600" height="68" rx="10" stroke-width="0.75" stroke-dasharray="4 3" opacity="0.5"/>

<g class="n-sage">
  <rect x="120" y="102" width="175" height="48" rx="8" stroke-width="1"/>
  <text class="node-label" x="207" y="122" text-anchor="middle">Haiku</text>
  <text class="node-desc" x="207" y="138" text-anchor="middle">Fast, cheap, high-volume</text>
</g>
<g class="n-navy">
  <rect x="313" y="102" width="175" height="48" rx="8" stroke-width="1"/>
  <text class="node-label" x="400" y="122" text-anchor="middle">Sonnet</text>
  <text class="node-desc" x="400" y="138" text-anchor="middle">Balanced workhorse</text>
</g>
<g class="n-plum">
  <rect x="506" y="102" width="175" height="48" rx="8" stroke-width="1"/>
  <text class="node-label" x="593" y="122" text-anchor="middle">Opus</text>
  <text class="node-desc" x="593" y="138" text-anchor="middle">Premium reasoning</text>
</g>

<rect class="zone" x="150" y="200" width="500" height="32" rx="6" stroke-width="0.75"/>
<text class="section-label" x="400" y="220" text-anchor="middle">Intelligent Model Routing</text>

<text class="section-label" x="400" y="278" text-anchor="middle">Product Surfaces</text>

<g class="n-navy">
  <rect x="233" y="295" width="175" height="72" rx="8" stroke-width="1"/>
  <text class="node-label" x="320" y="318" text-anchor="middle">API</text>
  <text class="node-desc" x="320" y="334" text-anchor="middle">Developer / Enterprise</text>
  <text class="node-desc" x="320" y="349" text-anchor="middle">Token-based pricing</text>
</g>

<g class="n-gold">
  <rect x="619" y="295" width="175" height="72" rx="8" stroke-width="1"/>
  <text class="node-label" x="706" y="318" text-anchor="middle">Cowork</text>
  <text class="node-desc" x="706" y="334" text-anchor="middle">Desktop agent</text>
  <text class="node-desc" x="706" y="349" text-anchor="middle">Non-developer tasks</text>
</g>

<text class="section-label" x="400" y="414" text-anchor="middle">User Segments</text>

<g class="n-slate">
  <rect x="50" y="425" width="155" height="36" rx="18" stroke-width="0.75"/>
  <text class="node-label" x="127" y="447" text-anchor="middle">Individuals</text>
</g>
<g class="n-slate">
  <rect x="243" y="425" width="155" height="36" rx="18" stroke-width="0.75"/>
  <text class="node-label" x="320" y="447" text-anchor="middle">Enterprises</text>
</g>
<g class="n-slate">
