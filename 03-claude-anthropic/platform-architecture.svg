  <text class="node-label" x="513" y="447" text-anchor="middle">Developers</text>
</g>
<g class="n-slate">
  <rect x="629" y="425" width="155" height="36" rx="18" stroke-width="0.75"/>
  <text class="node-label" x="706" y="447" text-anchor="middle">Teams</text>
</g>

<text class="section-label" x="400" y="510" text-anchor="middle">Cloud Distribution (API + Enterprise)</text>
<rect class="zone" x="120" y="522" width="560" height="58" rx="10" stroke-width="0.75" stroke-dasharray="4 3" opacity="0.5"/>

<g class="n-sage">
  <rect x="140" y="532" width="160" height="38" rx="6" stroke-width="0.75"/>
  <text class="cloud-label" x="220" y="555" text-anchor="middle" fill="#2D6A4F">AWS Bedrock</text>
</g>
<g class="n-navy">
  <rect x="320" y="532" width="160" height="38" rx="6" stroke-width="0.75"/>
  <text class="cloud-label" x="400" y="555" text-anchor="middle" fill="#1E3A5F">Google Vertex AI</text>
</g>
<g class="n-plum">
  <rect x="500" y="532" width="160" height="38" rx="6" stroke-width="0.75"/>
  <text class="cloud-label" x="580" y="555" text-anchor="middle" fill="#5B4A8A">Microsoft Azure</text>
</g>

<rect class="foundation" x="170" y="620" width="460" height="44" rx="8" stroke-width="1"/>
<text class="foundation-label" x="400" y="638" text-anchor="middle">Foundation: Constitutional AI</text>
<text class="node-desc" x="400" y="654" text-anchor="middle">Principle-based alignment across all models and surfaces</text>

