<svg viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="560" fill="#ffffff"/>
  <style>text { font-family: Arial, Helvetica, sans-serif; }</style>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Frontier AI Market: Three-Player Race (March 2026)</text>
  <text x="390" y="39" text-anchor="middle" font-size="11" fill="#888888">Different strategies for winning enterprise and consumer AI</text>

  <!-- Chart area: x=82 to 730, y=56 to 460 -->

  <!-- Y-axis label (rotated) -->
  <text transform="translate(16,258) rotate(-90)" text-anchor="middle" font-size="11" fill="#777777">Primary market</text>

  <!-- Y-axis top/bottom labels -->
  <text x="78" y="70" text-anchor="end" font-size="10" fill="#999999">Enterprise focused</text>
  <text x="78" y="457" text-anchor="end" font-size="10" fill="#999999">Consumer focused</text>

  <!-- X-axis label -->
  <text x="406" y="494" text-anchor="middle" font-size="11" fill="#777777">Go-to-market strategy</text>

  <!-- X-axis left/right labels -->
  <text x="86" y="476" text-anchor="start" font-size="10" fill="#999999">Safety-first</text>
  <text x="726" y="476" text-anchor="end" font-size="10" fill="#999999">Scale-first</text>

  <!-- Axes lines -->
  <line x1="84" y1="56" x2="84" y2="462" stroke="#dddddd" stroke-width="1"/>
  <line x1="84" y1="462" x2="728" y2="462" stroke="#dddddd" stroke-width="1"/>

  <!-- Quadrant labels -->
  <text x="170" y="80" text-anchor="middle" font-size="11" fill="#cccccc">Safety + Enterprise</text>
  <text x="590" y="80" text-anchor="middle" font-size="11" fill="#cccccc">Scale + Distribution</text>

  <!-- Horizontal midline -->
  <line x1="84" y1="259" x2="728" y2="259" stroke="#eeeeee" stroke-width="1"/>
  <!-- Vertical midline -->
  <line x1="406" y1="56" x2="406" y2="462" stroke="#eeeeee" stroke-width="1"/>

  <!-- ===== ANTHROPIC (Claude) — upper-left ===== -->
  <rect x="98" y="115" width="190" height="52" rx="6" fill="#e8f3ff" stroke="#5b8fd9" stroke-width="2"/>
  <text x="193" y="137" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f4f9b">Anthropic (Claude)</text>
  <text x="193" y="155" text-anchor="middle" font-size="9.5" fill="#1f4f9b">Safety-as-differentiator</text>

  <!-- Callout box for Anthropic -->
  <line x1="288" y1="141" x2="324" y2="141" stroke="#5b8fd9" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="324" y="100" width="226" height="88" rx="4" fill="#f8fbff" stroke="#5b8fd9" stroke-width="1"/>
  <text x="334" y="118" font-size="8.5" fill="#444444">80% enterprise revenue</text>
  <text x="334" y="132" font-size="8.5" fill="#444444">$14B ARR, $380B valuation</text>
  <text x="334" y="146" font-size="8.5" fill="#444444">Multi-cloud: AWS, GCP, Azure</text>
  <text x="334" y="160" font-size="8.5" fill="#444444">Claude Code $2.5B ARR</text>

  <!-- ===== OPENAI (ChatGPT) — center-right ===== -->
  <rect x="400" y="245" width="196" height="52" rx="6" fill="#ffffff" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="498" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#9b4015">OpenAI (ChatGPT)</text>
  <text x="498" y="285" text-anchor="middle" font-size="9.5" fill="#9b4015">Consumer scale, Microsoft</text>

  <!-- Callout box for OpenAI -->
  <line x1="596" y1="271" x2="626" y2="271" stroke="#e07a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="626" y="254" width="90" height="40" rx="4" fill="#fff8f4" stroke="#e07a3a" stroke-width="1"/>
  <text x="636" y="272" font-size="8.5" fill="#444444">800M+ weekly users</text>
  <text x="636" y="286" font-size="8.5" fill="#444444">ads in free tier</text>

  <!-- ===== GOOGLE (Gemini) — lower-right ===== -->
  <rect x="524" y="360" width="188" height="52" rx="6" fill="#ffffff" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="618" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#9b4015">Google (Gemini)</text>
  <text x="618" y="400" text-anchor="middle" font-size="9.5" fill="#9b4015">Distribution advantage</text>

  <!-- Callout box for Google -->
  <line x1="618" y1="360" x2="618" y2="340" stroke="#e07a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="516" y="310" width="204" height="30" rx="4" fill="#fff8f4" stroke="#e07a3a" stroke-width="1"/>
  <text x="618" y="330" text-anchor="middle" font-size="8.5" fill="#444444">Search, Chrome, Android, Cloud, TPUs</text>

  <!-- Caption (two lines) -->
  <text x="390" y="516" text-anchor="middle" font-size="9" fill="#aaaaaa" font-style="italic">Strategic framing chart based on publicly reported positioning, March 2026.</text>
  <text x="390" y="530" text-anchor="middle" font-size="9" fill="#aaaaaa" font-style="italic">Not an objective benchmark.</text>
</svg>
