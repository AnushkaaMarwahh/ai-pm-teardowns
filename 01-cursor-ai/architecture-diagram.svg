<svg viewBox="0 0 780 590" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="590" fill="#ffffff"/>
  <style>text { font-family: Arial, Helvetica, sans-serif; }</style>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Cursor AI: conceptual system architecture</text>
  <text x="390" y="39" text-anchor="middle" font-size="11" fill="#888888">Four interaction modes, layered execution, shared context</text>

  <!-- Developer action box -->
  <rect x="287" y="50" width="206" height="36" rx="6" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="390" y="73" text-anchor="middle" font-size="13" fill="#333333">Developer action</text>

  <!-- Branching lines from Developer action box -->
  <polyline points="390,86 390,98 90,98 90,112" fill="none" stroke="#bbbbbb" stroke-width="1"/>
  <polyline points="390,86 390,98 248,98 248,112" fill="none" stroke="#bbbbbb" stroke-width="1"/>
  <polyline points="390,86 390,98 445,98 445,112" fill="none" stroke="#bbbbbb" stroke-width="1"/>
  <polyline points="390,86 390,98 640,98 640,112" fill="none" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Tab completion box -->
  <rect x="22" y="112" width="136" height="52" rx="6" fill="#d5f2e8" stroke="#4db893" stroke-width="1.5"/>
  <text x="90" y="133" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1f7a55">Tab completion</text>
  <text x="90" y="152" text-anchor="middle" font-size="10" fill="#1f7a55">Instant</text>

  <!-- Chat box -->
  <rect x="183" y="112" width="130" height="52" rx="6" fill="#ede9f8" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="248" y="133" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#574898">Chat</text>
  <text x="248" y="152" text-anchor="middle" font-size="10" fill="#574898">Seconds</text>

  <!-- Agent / Composer box -->
  <rect x="378" y="112" width="134" height="52" rx="6" fill="#ede9f8" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="445" y="133" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#574898">Agent / Composer</text>
  <text x="445" y="152" text-anchor="middle" font-size="10" fill="#574898">Minutes</text>

  <!-- Background agent box -->
  <rect x="573" y="112" width="134" height="52" rx="6" fill="#fde8d2" stroke="#d97a3a" stroke-width="1.5"/>
  <text x="640" y="133" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#9b4015">Background agent</text>
  <text x="640" y="152" text-anchor="middle" font-size="10" fill="#9b4015">Async</text>

  <!-- Lines to model boxes -->
  <line x1="90" y1="164" x2="90" y2="196" stroke="#bbbbbb" stroke-width="1"/>
  <polyline points="248,164 248,181 320,181 320,196" fill="none" stroke="#bbbbbb" stroke-width="1"/>
  <polyline points="445,164 445,181 390,181 390,196" fill="none" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="640" y1="164" x2="640" y2="196" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Custom in-house model box -->
  <rect x="18" y="196" width="144" height="50" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="90" y="216" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#444444">Custom in-house model</text>
  <text x="90" y="233" text-anchor="middle" font-size="9" fill="#888888">Per company disclosures</text>

  <!-- Frontier model (user choice) box — spans Chat+Agent -->
  <rect x="207" y="196" width="226" height="50" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="320" y="214" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#444444">Frontier model (user choice)</text>
  <text x="320" y="232" text-anchor="middle" font-size="9" fill="#888888">Claude / GPT / Gemini via API</text>

  <!-- Cloud VM box -->
  <rect x="568" y="196" width="144" height="50" rx="6" fill="#f6f6f6" stroke="#cccccc" stroke-width="1.5"/>
  <text x="640" y="216" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#444444">Cloud VM (isolated)</text>
  <text x="640" y="233" text-anchor="middle" font-size="9" fill="#888888">Sandboxed execution</text>

  <!-- Frequency labels -->
  <text x="90" y="264" text-anchor="middle" font-size="10" fill="#aaaaaa">Highest frequency</text>
  <text x="390" y="264" text-anchor="middle" font-size="10" fill="#aaaaaa">Medium frequency</text>
  <text x="640" y="264" text-anchor="middle" font-size="10" fill="#aaaaaa">Lowest frequency</text>

  <!-- Cost per interaction line + label -->
  <line x1="30" y1="277" x2="750" y2="277" stroke="#e0e0e0" stroke-width="1"/>
  <text x="390" y="293" text-anchor="middle" font-size="10" fill="#bbbbbb">Cost per interaction increases</text>

  <!-- Shared context heading -->
  <text x="390" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#666666">Shared context layer (the moat)</text>

  <!-- Codebase indexing box -->
  <rect x="28" y="328" width="196" height="52" rx="6" fill="#d5f2e8" stroke="#4db893" stroke-width="1.5"/>
  <text x="126" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f7a55">Codebase indexing</text>
  <text x="126" y="367" text-anchor="middle" font-size="9" fill="#1f7a55">Full project embeddings</text>

  <!-- .cursorrules box -->
  <rect x="292" y="328" width="196" height="52" rx="6" fill="#ede9f8" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="390" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#574898">.cursorrules</text>
  <text x="390" y="367" text-anchor="middle" font-size="9" fill="#574898">Project instructions</text>

  <!-- Persistent memory box -->
  <rect x="556" y="328" width="196" height="52" rx="6" fill="#ddeeff" stroke="#5588cc" stroke-width="1.5"/>
  <text x="654" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a5a99">Persistent memory</text>
  <text x="654" y="367" text-anchor="middle" font-size="9" fill="#2a5a99">Cross-session context</text>

  <!-- Lines to Feeds box -->
  <polyline points="126,380 126,420 290,420" fill="none" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="390" y1="380" x2="390" y2="420" stroke="#bbbbbb" stroke-width="1"/>
  <polyline points="654,380 654,420 490,420" fill="none" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Feeds context to all four modes box -->
  <rect x="248" y="420" width="284" height="38" rx="6" fill="#f0f0f0" stroke="#cccccc" stroke-width="1.5"/>
  <text x="390" y="444" text-anchor="middle" font-size="12" fill="#444444">Feeds context to all four modes</text>

  <!-- Caption -->
  <text x="390" y="492" text-anchor="middle" font-size="9" fill="#aaaaaa" font-style="italic">Conceptual product architecture based on public documentation and reporting</text>
</svg>
