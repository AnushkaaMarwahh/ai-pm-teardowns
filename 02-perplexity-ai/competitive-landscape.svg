<svg width="100%" viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg">
<style>
:root { color-scheme: light dark; }
text { font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif; }

/* Light mode */
.title { font-size: 15px; font-weight: 600; fill: #1A1A1A; letter-spacing: -0.01em; }
.subtitle { font-size: 11px; font-weight: 400; fill: #6B7280; }
.node-label { font-size: 12px; font-weight: 600; }
.node-desc { font-size: 9.5px; font-weight: 400; fill: #6B7280; }
.axis-label { font-size: 10px; font-weight: 500; fill: #374151; }
.axis-end { font-size: 9.5px; font-weight: 400; fill: #9CA3AF; }
.zone-label { font-size: 9.5px; font-weight: 500; fill: #9CA3AF; }
.callout-label { font-size: 9.5px; font-weight: 500; fill: #2D6A4F; }
.footer { font-size: 9px; font-weight: 400; fill: #9CA3AF; font-style: italic; }

/* Nodes use same palette as architecture diagram */
.n-perplexity rect { fill: #EDF5F0; stroke: #2D6A4F; }
.n-perplexity .node-label { fill: #2D6A4F; }
.n-anthropic rect { fill: #F0EDF5; stroke: #5B4A8A; }
.n-anthropic .node-label { fill: #5B4A8A; }
.n-google rect { fill: #F5EDE7; stroke: #8B4513; }
.n-google .node-label { fill: #8B4513; }
.n-openai rect { fill: #EFF4F9; stroke: #1E3A5F; }
.n-openai .node-label { fill: #1E3A5F; }
.n-bing rect { fill: #F3F4F6; stroke: #6B7280; }
.n-bing .node-label { fill: #4B5563; }

line.axis { stroke: #D1D5DB; stroke-width: 1; }
line.fault { stroke: #E5E7EB; stroke-width: 1; stroke-dasharray: 6 4; }
rect.zone { fill: #FAFAFA; stroke: #E5E7EB; }
line.callout-line { stroke: #2D6A4F; stroke-width: 0.5; stroke-dasharray: 3 2; }

@media (prefers-color-scheme: dark) {
  .title { fill: #E5E7EB; } .subtitle { fill: #9CA3AF; }
  .node-desc { fill: #9CA3AF; } .axis-label { fill: #D1D5DB; }
  .axis-end { fill: #6B7280; } .zone-label { fill: #6B7280; }
  .callout-label { fill: #86EFAC; } .footer { fill: #6B7280; }

  .n-perplexity rect { fill: #1A3D2E; stroke: #4D9B72; } .n-perplexity .node-label { fill: #86EFAC; }
  .n-anthropic rect { fill: #2D2550; stroke: #8B7FC7; } .n-anthropic .node-label { fill: #C4B5FD; }
  .n-google rect { fill: #3D2410; stroke: #C87137; } .n-google .node-label { fill: #FDBA74; }
  .n-openai rect { fill: #172B45; stroke: #4A7FB5; } .n-openai .node-label { fill: #93C5FD; }
  .n-bing rect { fill: #1F2937; stroke: #6B7280; } .n-bing .node-label { fill: #D1D5DB; }

  line.axis { stroke: #4B5563; } line.fault { stroke: #374151; }
  rect.zone { fill: #1F2937; stroke: #374151; }
  line.callout-line { stroke: #4D9B72; }
}
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<line class="axis" x1="110" y1="80" x2="110" y2="440" marker-end="url(#a)"/>
<line class="axis" x1="110" y1="440" x2="660" y2="440" marker-end="url(#a)"/>

<rect class="zone" x="118" y="86" width="230" height="188" rx="10" stroke-width="0.75" stroke-dasharray="4 3" opacity="0.5"/>
<text class="zone-label" x="130" y="104">Subscription-first camp</text>

<rect class="zone" x="394" y="86" width="258" height="348" rx="10" stroke-width="0.75" stroke-dasharray="4 3" opacity="0.5"/>
<text class="zone-label" x="406" y="104">Ad-supported camp</text>

<g class="n-perplexity">
  <rect x="140" y="122" width="180" height="50" rx="8" stroke-width="1"/>
  <text class="node-label" x="230" y="144" text-anchor="middle">Perplexity</text>
  <text class="node-desc" x="230" y="160" text-anchor="middle">Dropped ads Feb 2026</text>
</g>

<g class="n-anthropic">
  <rect x="140" y="198" width="180" height="44" rx="8" stroke-width="0.75"/>
  <text class="node-label" x="230" y="224" text-anchor="middle">Anthropic (Claude)</text>
</g>

<g class="n-openai">
  <rect x="430" y="248" width="190" height="50" rx="8" stroke-width="0.75"/>
  <text class="node-label" x="525" y="269" text-anchor="middle">ChatGPT Search</text>
  <text class="node-desc" x="525" y="285" text-anchor="middle">Ads announced (Free/Go)</text>
</g>

<text class="footer" x="370" y="510" text-anchor="middle">Strategic framing chart based on publicly reported monetization strategies, March 2026.</text>
<text class="footer" x="370" y="524" text-anchor="middle">Axes reflect an interpretive thesis on market positioning, not an objective benchmark.</text>
</svg>
