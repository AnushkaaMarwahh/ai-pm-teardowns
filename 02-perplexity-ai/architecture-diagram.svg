<svg width="100%" viewBox="0 0 720 660" xmlns="http://www.w3.org/2000/svg">
<style>
:root { color-scheme: light dark; }
text { font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif; }

/* Light mode */
.title { font-size: 15px; font-weight: 600; fill: #1A1A1A; letter-spacing: -0.01em; }
.subtitle { font-size: 11px; font-weight: 400; fill: #6B7280; }
.node-label { font-size: 12px; font-weight: 600; }
.node-desc { font-size: 10px; font-weight: 400; fill: #6B7280; }
.stage-num { font-size: 9px; font-weight: 700; fill: #FFFFFF; }
.side-label { font-size: 10.5px; font-weight: 600; }
.side-desc { font-size: 9.5px; font-weight: 400; fill: #6B7280; }
.footer { font-size: 9px; font-weight: 400; fill: #9CA3AF; font-style: italic; }
.insight-label { font-size: 10px; font-weight: 600; fill: #374151; }
.insight-text { font-size: 9.5px; font-weight: 400; fill: #6B7280; }
.start-label { font-size: 12px; font-weight: 500; fill: #374151; }
.end-label { font-size: 12px; font-weight: 600; fill: #374151; }

.pill-1 { fill: #1E3A5F; }
.pill-2 { fill: #2D6A4F; }
.pill-3 { fill: #5B4A8A; }
.pill-4 { fill: #8B4513; }
.pill-5 { fill: #7C6A2E; }

.n1 rect { fill: #EFF4F9; stroke: #1E3A5F; } .n1 .node-label { fill: #1E3A5F; }
.n2 rect { fill: #EDF5F0; stroke: #2D6A4F; } .n2 .node-label { fill: #2D6A4F; }
.n3 rect { fill: #F0EDF5; stroke: #5B4A8A; } .n3 .node-label { fill: #5B4A8A; }
.n4 rect { fill: #F5EDE7; stroke: #8B4513; } .n4 .node-label { fill: #8B4513; }
.n5 rect { fill: #F3F1E6; stroke: #7C6A2E; } .n5 .node-label { fill: #7C6A2E; }

.ns rect { fill: #F3F4F6; stroke: #9CA3AF; }
.ne rect { fill: #F3F4F6; stroke: #374151; }

.ss rect { fill: #EDF5F0; stroke: #2D6A4F; } .ss .side-label { fill: #2D6A4F; }
.sf rect { fill: #EFF4F9; stroke: #1E3A5F; } .sf .side-label { fill: #1E3A5F; }

line.c { stroke: #D1D5DB; stroke-width: 1; }
line.sd { stroke: #D1D5DB; stroke-width: 0.75; stroke-dasharray: 4 3; }
rect.ib { fill: #FAFAFA; stroke: #E5E7EB; }

@media (prefers-color-scheme: dark) {
  .title { fill: #E5E7EB; } .subtitle { fill: #9CA3AF; } .node-desc { fill: #9CA3AF; }
  .footer { fill: #6B7280; } .insight-label { fill: #D1D5DB; } .insight-text { fill: #9CA3AF; }
  .start-label { fill: #D1D5DB; } .end-label { fill: #D1D5DB; } .side-desc { fill: #9CA3AF; }

  .n1 rect { fill: #172B45; stroke: #4A7FB5; } .n1 .node-label { fill: #93C5FD; }
  .n2 rect { fill: #1A3D2E; stroke: #4D9B72; } .n2 .node-label { fill: #86EFAC; }
  .n3 rect { fill: #2D2550; stroke: #8B7FC7; } .n3 .node-label { fill: #C4B5FD; }
  .n4 rect { fill: #3D2410; stroke: #C87137; } .n4 .node-label { fill: #FDBA74; }
  .n5 rect { fill: #342E14; stroke: #B59B3A; } .n5 .node-label { fill: #FDE68A; }

  .ns rect { fill: #1F2937; stroke: #6B7280; }
  .ne rect { fill: #1F2937; stroke: #9CA3AF; }

  .ss rect { fill: #1A3D2E; stroke: #4D9B72; } .ss .side-label { fill: #86EFAC; }
  .sf rect { fill: #172B45; stroke: #4A7FB5; } .sf .side-label { fill: #93C5FD; }

  line.c { stroke: #4B5563; } line.sd { stroke: #4B5563; }
  rect.ib { fill: #1F2937; stroke: #374151; }
}
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="ns"><rect x="270" y="72" width="180" height="38" rx="19" stroke-width="1"/></g>
<text class="start-label" x="360" y="95" text-anchor="middle">User Query</text>
<line class="c" x1="360" y1="110" x2="360" y2="138" marker-end="url(#a)"/>

<g class="n2">
  <rect x="215" y="220" width="290" height="52" rx="8" stroke-width="1"/>
  <text class="node-label" x="262" y="242">Web Retrieval</text>
  <text class="node-desc" x="262" y="258">Built on Vespa search platform</text>
</g>
<circle class="pill-2" cx="240" cy="240" r="10"/><text class="stage-num" x="240" y="244" text-anchor="middle">2</text>
<line class="c" x1="360" y1="272" x2="360" y2="298" marker-end="url(#a)"/>

<g class="n4">
  <rect x="215" y="380" width="290" height="52" rx="8" stroke-width="1"/>
  <text class="node-label" x="262" y="402">Synthesis</text>
  <text class="node-desc" x="262" y="418">Multi-model generation engine</text>
</g>
<circle class="pill-4" cx="240" cy="400" r="10"/><text class="stage-num" x="240" y="404" text-anchor="middle">4</text>

<g class="sf">
  <rect x="544" y="384" width="148" height="42" rx="6" stroke-width="0.75"/>
  <text class="side-label" x="618" y="400" text-anchor="middle">Frontier Models</text>
  <text class="side-desc" x="618" y="415" text-anchor="middle">Pro / complex queries</text>
</g>
<line class="sd" x1="544" y1="405" x2="507" y2="405" marker-end="url(#a)"/>

<line class="c" x1="360" y1="432" x2="360" y2="458" marker-end="url(#a)"/>

<g class="ne"><rect x="245" y="542" width="230" height="38" rx="19" stroke-width="1"/></g>
<text class="end-label" x="360" y="565" text-anchor="middle">Cited Answer Delivered</text>

<text class="footer" x="360" y="645" text-anchor="middle">Conceptual architecture based on public documentation (ByteByteGo, Vespa case study)</text>
</svg>
