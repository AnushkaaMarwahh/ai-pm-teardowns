  <text x="121" y="526" text-anchor="middle" font-size="8.5" fill="#777777">layer, not the best LLM or index.</text>

  <text x="390" y="585" text-anchor="middle" font-size="9" fill="#aaaaaa" font-style="italic">Conceptual architecture based on public documentation (ByteByteGo, Vespa case study)</text>
